name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-jvm:
    name: Build & check (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Assemble & check
        run: ./gradlew assemble check

  ios:
    name: Build iOS targets
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile iOS klibs + sample framework
        run: ./gradlew :a2cui-core:iosArm64MainKlibrary :a2cui-compose:iosArm64MainKlibrary :a2cui-sample-ios:assemble

  abi-check:
    name: Kotlin ABI check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Check Kotlin ABI
        run: ./gradlew checkKotlinAbi

  snapshot-publish:
    name: Snapshot publish
    runs-on: ubuntu-latest
    needs: [build-jvm, abi-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # Only publish when signing + Maven Central credentials are available.
      # Forks without secrets (and any push before secrets are wired) will
      # skip the publish step cleanly instead of failing the build.
      # TODO: once the following repo secrets are configured, this job will
      # start publishing SNAPSHOT artifacts on every push to `main`:
      #   - ORG_GRADLE_PROJECT_signingInMemoryKey
      #   - ORG_GRADLE_PROJECT_signingInMemoryKeyPassword
      #   - ORG_GRADLE_PROJECT_mavenCentralUsername
      #   - ORG_GRADLE_PROJECT_mavenCentralPassword
      # See PUBLICATION.md. Snapshot task is `publishToMavenCentral`
      # (Vanniktech maven-publish via `com.mikepenz.convention.publishing`);
      # it routes to the OSSRH snapshots repo when VERSION_NAME ends in
      # `-SNAPSHOT`.
      - name: Check for signing secret
        id: secrets
        env:
          SIGNING_KEY: ${{ secrets.ORG_GRADLE_PROJECT_signingInMemoryKey }}
        run: |
          if [ -n "$SIGNING_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Signing key not configured — skipping snapshot publish."
          fi

      - name: Publish snapshot to Maven Central
        if: steps.secrets.outputs.present == 'true'
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_signingInMemoryKey }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GRADLE_PROJECT_signingInMemoryKeyPassword }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_mavenCentralUsername }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_mavenCentralPassword }}
        run: ./gradlew publishToMavenCentral
