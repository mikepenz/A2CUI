name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-jvm:
    name: Build & check (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Assemble & check
        run: ./gradlew assemble check

  ios:
    name: Build iOS targets
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile iOS klibs + sample framework
        run: ./gradlew :a2cui-core:iosArm64MainKlibrary :a2cui-compose:iosArm64MainKlibrary :a2cui-sample-ios:assemble

  abi-check:
    name: Kotlin ABI check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Check Kotlin ABI
        run: ./gradlew checkKotlinAbi

